version: '3.8'

services:
  # The Database
  mongodb:
    image: mongo:latest
    container_name: analytics_mongodb
    ports:
      - "27017:27017" # Exposed for local debugging
    volumes:
      - mongo_data:/data/db # Persist data across boots
    networks:
      - analytics_network

  # The Express & Socket.io Server
  backend:
    build: ./backend
    container_name: analytics_backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/analytics-system # Notice it uses the container name!
      - JWT_SECRET=super_secret_jwt_key_that_should_be_long
    depends_on:
      - mongodb
    networks:
      - analytics_network

  # The React Dashboard
  frontend:
    build: ./frontend
    container_name: analytics_frontend
    ports:
      - "3000:80" # Reachable locally on localhost:3000
    depends_on:
      - backend
    networks:
      - analytics_network

# Bind services securely onto the same software bridge
networks:
  analytics_network:
    driver: bridge

# Ensures database records outlive container shutdowns
volumes:
  mongo_data:
